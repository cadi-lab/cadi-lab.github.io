<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Analytics (GA4) -->
{% if site.google_analytics %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}');
</script>
<script defer src="{{ '/assets/js/enhanced-tracking.js' | relative_url }}"></script>
{% endif %}
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">

<!-- Favicon (SVG with dark/light theme support + PNG fallbacks) -->
<link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/assets/img/favicon-32x32.png' | relative_url }}" sizes="32x32" type="image/png">
<link rel="icon" href="{{ '/assets/img/favicon-16x16.png' | relative_url }}" sizes="16x16" type="image/png">
<link rel="apple-touch-icon" href="{{ '/assets/img/apple-touch-icon.png' | relative_url }}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<!-- Academicons (arXiv, SSRN, ORCID icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.4/css/academicons.min.css">

<!-- Site CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- CADI Lab Structured Data -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ResearchOrganization",
  "name": "CADI Lab",
  "alternateName": "Causal Analysis for Digital Interventions Lab",
  "url": "https://cadi-lab.github.io",
  "description": "CADI Lab at National Tsing Hua University investigates how platform and technology design choices shape user behavior and market outcomes using causal machine learning, field experiments, and quasi-experimental methods.",
  "parentOrganization": {
    "@type": "CollegeOrUniversity",
    "name": "National Tsing Hua University",
    "url": "https://www.nthu.edu.tw",
    "department": {
      "@type": "Organization",
      "name": "Institute of Service Science, College of Technology Management"
    }
  },
  "member": {
    "@type": "Person",
    "name": "Jaewon Yoo",
    "jobTitle": "Assistant Professor",
    "url": "https://j1yoo.github.io"
  },
  "knowsAbout": ["Causal Inference", "Platform Economics", "Field Experiments", "Quasi-Experimental Methods", "Causal Machine Learning", "Digital Markets"]
}
</script>
