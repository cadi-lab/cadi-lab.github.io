<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a365d"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>
  <!-- Accent bar top -->
  <rect x="0" y="0" width="1200" height="6" fill="#0891b2"/>
  <!-- Accent bar bottom -->
  <rect x="0" y="624" width="1200" height="6" fill="#0891b2"/>
  <!-- Lab name -->
  <text x="600" y="260" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="800" font-size="88" fill="#ffffff" letter-spacing="-2">CADI Lab</text>
  <!-- Full name -->
  <text x="600" y="340" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="30" fill="#94a3b8" letter-spacing="6">CAUSAL ANALYSIS FOR DIGITAL INTERVENTIONS</text>
  <!-- Divider -->
  <rect x="500" y="380" width="200" height="2" fill="#334155" rx="1"/>
  <!-- University -->
  <text x="600" y="430" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="500" font-size="24" fill="#64748b">National Tsing Hua University</text>
  <text x="600" y="468" text-anchor="middle" font-family="Inter, Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="20" fill="#475569">College of Technology Management</text>
</svg>
