# ──────────────────────────────────────────────────────────────────────────────
# CADI Lab — Site Configuration
# ──────────────────────────────────────────────────────────────────────────────

title: CADI Lab
icon: favicon.svg # the emoji or image name in /assets/img/ used as the favicon
description: >-
  CADI Lab (Causal Analysis for Digital Interventions) at National Tsing Hua University
  investigates how platform and technology design choices shape user behavior and market
  outcomes using causal machine learning, field experiments, and quasi-experimental methods.
keywords: causal inference, digital platforms, field experiments, RCT, difference-in-differences, regression discontinuity, platform economics, causal machine learning, NTHU, research lab
url: "https://cadi-lab.github.io"

# Google Analytics
google_analytics: G-F2Y4X86JTT
baseurl: ""

# Build
markdown: kramdown
highlighter: rouge
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections (optional for future use)
# collections:
#   publications:
#     output: true

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: default
      image: /assets/img/og-image.png

# SEO / Social sharing
image: /assets/img/og-image.png

# Lab-specific
pi_homepage: "https://j1yoo.github.io"
pi_email: "jaewon.yoo@iss.nthu.edu.tw"
